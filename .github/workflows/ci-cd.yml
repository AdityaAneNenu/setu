name: 🚀 SETU PM-AJAY CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: 3.11

jobs:
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
        
    - name: Run Security Scan (Bandit)
      run: |
        bandit -r . -x ./mobile-app,./frontend,./venv,./staticfiles -f json -o bandit-report.json
      continue-on-error: true
        
    - name: Check Dependencies (Safety)
      run: |
        pip freeze > requirements-check.txt
        safety check -r requirements-check.txt --json
      continue-on-error: true

  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test_setu
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
    - uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-django coverage
        
    - name: Set up Environment
      run: |
        echo "SECRET_KEY=test-secret-key-for-ci" > .env
        echo "DATABASE_URL=postgresql://postgres:testpass@localhost:5432/test_setu" >> .env
        echo "DEBUG=False" >> .env
        echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> .env
        
    - name: Run Migrations
      run: |
        python manage.py makemigrations --check
        python manage.py migrate
        
    - name: Run Tests with Coverage
      run: |
        coverage run --source='.' manage.py test core --verbosity=2
        coverage report --show-missing
        coverage xml
        
    - name: Upload Coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        
  build-frontend:
    name: 🎨 Frontend Build
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Lint Code
      run: npm run lint
      continue-on-error: true
      
    - name: Build Application
      run: npm run build
      
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: frontend/.next/

  build-mobile:
    name: 📱 Mobile App Build Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./mobile-app
        
    steps:
    - uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: mobile-app/package-lock.json
        
    - name: Install Expo CLI
      run: npm install -g @expo/cli
      
    - name: Install Dependencies
      run: npm ci
      
    - name: Check Expo Configuration
      run: npx expo config --type introspect
      
    - name: Validate App Configuration
      run: |
        if [ ! -f "app.json" ]; then
          echo "❌ app.json missing"
          exit 1
        fi
        
        if [ ! -f "src/config/firebase.js" ]; then
          echo "❌ Firebase config missing"
          exit 1
        fi
        
        echo "✅ Mobile app configuration valid"

  deployment-verification:
    name: 🔍 Deployment Verification
    runs-on: ubuntu-latest
    needs: [security-scan, test-backend, build-frontend, build-mobile]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Pre-Deployment Verification
      env:
        SECRET_KEY: test-secret-key
        DATABASE_URL: sqlite:///db.sqlite3
        DEBUG: False
      run: |
        python verify_deployment.py --pre-deploy
        
  notify-success:
    name: ✅ Notify Success
    runs-on: ubuntu-latest
    needs: [deployment-verification]
    if: success() && github.ref == 'refs/heads/main'
    
    steps:
    - name: Success Notification
      run: |
        echo "🎉 SETU PM-AJAY deployment verification passed!"
        echo "✅ Security scan completed"
        echo "✅ Backend tests passed"  
        echo "✅ Frontend build successful"
        echo "✅ Mobile app configuration valid"
        echo "✅ Deployment verification passed"
        echo ""
        echo "🚀 Ready for production deployment to Railway!"